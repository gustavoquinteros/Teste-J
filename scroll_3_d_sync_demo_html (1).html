<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo — 3D Scroll Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <style>
    :root {
      --void:        #000005;
      --tron-cyan:   #00f0ff;
      --tron-orange: #ff6a00;
      --tron-white:  #e8f4ff;
      --tron-grid:   rgba(0,240,255,0.12);
      --tron-glow:   rgba(0,240,255,0.6);
      --tron-dim:    rgba(0,240,255,0.25);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--void);
      color: var(--tron-white);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    body { height: 1320vh; }

    #scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 0;
      background: var(--void);
      opacity: 0;
      transition: opacity .7s ease;
    }

    body.is-ready #scene { opacity: 1; }

    .grain, .ambient-layer, .vignette, .hud-reticle, .frame, .topbar, .side-nav, .hero-copy, .data-hud, .progress-panel, .bottom-bar {
      opacity: 0;
      transition: opacity .8s ease;
    }

    body.is-ready .grain,
    body.is-ready .ambient-layer,
    body.is-ready .vignette,
    body.is-ready .hud-reticle,
    body.is-ready .frame,
    body.is-ready .topbar,
    body.is-ready .side-nav,
    body.is-ready .hero-copy,
    body.is-ready .data-hud,
    body.is-ready .progress-panel,
    body.is-ready .bottom-bar { opacity: 1; }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: var(--void);
      transition: opacity .65s ease, visibility .65s ease;
    }

    .loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-box {
      width: min(420px, calc(100vw - 48px));
      text-align: center;
      color: var(--tron-cyan);
    }

    .loader-logo {
      margin-bottom: 34px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .44em;
      text-transform: uppercase;
      text-shadow: 0 0 32px var(--tron-glow);
    }

    .loader-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--tron-dim);
    }

    .loader-track {
      height: 6px;
      width: 100%;
      background: var(--tron-grid);
      overflow: hidden;
      border: 1px solid var(--tron-cyan);
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--tron-cyan), var(--tron-white));
      box-shadow: 0 0 24px rgba(0,240,255,0.9);
      transition: width .25s ease;
    }

    .loader-status {
      margin-top: 14px;
      min-height: 18px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--tron-dim);
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mix-blend-mode: screen;
    }

    .ambient-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 38%, rgba(20, 185, 255, .18), transparent 34%),
        radial-gradient(circle at 18% 64%, rgba(111, 125, 255, .12), transparent 30%),
        radial-gradient(circle at 78% 18%, rgba(20, 215, 255, .1), transparent 26%);
      mix-blend-mode: screen;
    }

    .ambient-layer::before {
      content: "";
      position: absolute;
      inset: -20%;
      opacity: .26;
      background:
        linear-gradient(110deg, transparent 0%, rgba(20, 185, 255, .09) 42%, transparent 56%),
        linear-gradient(72deg, transparent 12%, rgba(111, 125, 255, .08) 48%, transparent 70%);
      filter: blur(24px);
      animation: auroraDrift 18s ease-in-out infinite alternate;
    }

    .ambient-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .22;
      background: repeating-linear-gradient(0deg, rgba(213,224,255,.08) 0 1px, transparent 1px 5px);
      mix-blend-mode: overlay;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, transparent 0 38%, rgba(0,0,0,.28) 68%, rgba(0,0,0,.76) 100%),
        linear-gradient(90deg, rgba(0,0,0,.58), transparent 20%, transparent 80%, rgba(0,0,0,.58));
    }

    .frame {
      position: fixed;
      inset: 32px;
      z-index: 4;
      pointer-events: none;
      border: 1px solid var(--line);
      clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 16px, 100% calc(100% - 16px), calc(100% - 16px) 100%, 16px 100%, 0 calc(100% - 16px), 0 16px);
    }

    .hud-reticle {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 42vmin;
      height: 42vmin;
      z-index: 4;
      pointer-events: none;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0,240,255,0.1);
      border-radius: 50%;
      box-shadow: inset 0 0 60px rgba(0,240,255,.05), 0 0 90px rgba(0,240,255,.02);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .hud-reticle:hover {
      transform: translate(-50%, -50%) scale(1.06);
      border-color: rgba(255, 106, 0, 0.3);
      cursor: crosshair;
    }

    .hud-reticle.is-idle::before {
      animation: spinHud 8s linear infinite;
      opacity: 0.4;
      border-color: rgba(0, 240, 255, 0.3);
    }

    .hud-reticle::before,
    .hud-reticle::after {
      content: "";
      position: absolute;
      inset: 12%;
      border: 1px dashed rgba(0,240,255,.15);
      border-radius: 50%;
      animation: spinHud 24s linear infinite;
    }

    .hud-reticle::after {
      inset: 28%;
      animation-duration: 16s;
      animation-direction: reverse;
      opacity: .7;
    }
    
    .hud-cyan { border-color: var(--tron-cyan) !important; }
    .hud-orange { border-color: var(--tron-orange) !important; }

    .topbar {
      position: fixed;
      top: 48px;
      left: 58px;
      right: 58px;
      z-index: 6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .logo {
      font-size: 24px;
      letter-spacing: .42em;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(20,185,255,.3);
    }

    .buttons { display: flex; pointer-events: auto; }

    .btn {
      height: 54px;
      padding: 0 26px;
      border: 1px solid var(--tron-cyan);
      color: var(--tron-cyan);
      background: rgba(0,240,255,0.06);
      backdrop-filter: blur(16px);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
    }

    .btn.light { color: var(--void); background: var(--tron-cyan); border-color: var(--tron-cyan); }

    .pixel-icon {
      width: 12px;
      height: 12px;
      display: grid;
      grid-template-columns: repeat(2, 4px);
      grid-template-rows: repeat(2, 4px);
      gap: 4px;
    }

    .pixel-icon i { display: block; width: 4px; height: 4px; background: currentColor; }

    .side-nav {
      position: fixed;
      top: 50%;
      left: 46px;
      transform: translateY(-50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      gap: 18px;
      pointer-events: none;
    }

    .nav-item {
      position: relative;
      padding-left: 18px;
      font-size: 12px;
      letter-spacing: .26em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--tron-dim);
      transition: color .25s ease, transform .25s ease;
    }

    .nav-item::before {
      content: "";
      width: 8px;
      height: 8px;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%) scale(0);
      background: var(--tron-cyan);
      box-shadow: 0 0 18px var(--tron-glow);
      transition: transform .25s ease;
    }

    .nav-item.active { color: var(--tron-cyan); transform: translateX(4px); }
    .nav-item.active::before { transform: translateY(-50%) scale(1); }

    .hero-copy {
      position: fixed;
      left: 50%;
      bottom: 17vh;
      width: min(640px, calc(100vw - 56px));
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    .eyebrow {
      margin-bottom: 14px;
      font-size: 12px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--tron-dim);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 4vw, 58px);
      line-height: .92;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-shadow: 0 0 42px var(--tron-glow);
    }

    p {
      width: min(560px, 100%);
      margin: 24px auto 0;
      color: var(--tron-white);
      font-size: 16px;
      line-height: 1.65;
    }

    .cta {
      margin: 32px auto 0;
      width: fit-content;
      padding: 18px 28px;
      border: 1px solid var(--tron-cyan);
      background: rgba(0,240,255,0.08);
      backdrop-filter: blur(18px);
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      font-weight: 800;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    }

    .data-hud {
      position: fixed;
      left: 58px;
      bottom: 116px;
      z-index: 7;
      display: grid;
      gap: 8px;
      pointer-events: none;
      color: rgba(213,224,255,.44);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    
    .data-hud .warning { color: var(--tron-orange); }

    .data-hud span { display: inline-flex; align-items: center; gap: 8px; }
    .data-hud span::before { content: ""; width: 6px; height: 6px; background: var(--tron-cyan); box-shadow: 0 0 12px var(--tron-cyan); }
    .data-hud span.warning::before { background: var(--tron-orange); box-shadow: 0 0 12px var(--tron-orange); }
    
    .speed-bar {
      width: 100px;
      height: 2px;
      background: rgba(0,240,255,0.15);
      margin-left: 8px;
      display: inline-block;
    }
    .speed-fill {
      height: 100%;
      background: var(--tron-cyan);
      box-shadow: 0 0 8px var(--tron-glow);
      width: 0%;
    }

    .progress-panel {
      position: fixed;
      right: 52px;
      bottom: 116px;
      z-index: 8;
      width: 260px;
      padding: 16px;
      background: rgba(0,0,5,.55);
      border: 1px solid var(--tron-cyan);
      backdrop-filter: blur(20px);
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--tron-dim);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .track { width: 100%; height: 4px; background: var(--tron-grid); overflow: hidden; }
    .fill { width: 0%; height: 100%; background: var(--tron-cyan); box-shadow: 0 0 16px var(--tron-glow); }

    .bottom-bar {
      position: fixed;
      left: 32px;
      right: 32px;
      bottom: 32px;
      height: 64px;
      z-index: 6;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--tron-cyan);
      pointer-events: none;
    }

    .sound, .chat {
      height: 64px;
      padding: 0 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      background: rgba(213,224,255,.02);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    @keyframes auroraDrift {
      from { transform: translate3d(-6%, -2%, 0) rotate(-6deg) scale(1); }
      to { transform: translate3d(6%, 3%, 0) rotate(4deg) scale(1.08); }
    }

    @keyframes spinHud { to { transform: rotate(360deg); } }

    @media (max-width: 760px) {
      .topbar { left: 28px; right: 28px; top: 28px; }
      .logo { font-size: 18px; letter-spacing: .28em; }
      .btn { height: 46px; padding: 0 16px; }
      .btn:first-child { display: none; }
      .side-nav { display: none; }
      .frame { inset: 12px; }
      .bottom-bar { left: 12px; right: 12px; bottom: 12px; }
      .progress-panel { display: none; }
      .hero-copy { bottom: 15vh; text-align: left; }
      p { margin-left: 0; }
      .cta { margin-left: 0; }
      .data-hud { left: 28px; bottom: 96px; }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-box">
      <div class="loader-logo">HUBTOWN</div>
      <div class="loader-label"><span id="loaderStep">preparing scene</span><span id="loaderPercent">0%</span></div>
      <div class="loader-track"><div class="loader-fill" id="loaderFill"></div></div>
      <div class="loader-status" id="loaderStatus">building terrain</div>
    </div>
  </div>

  <canvas id="scene"></canvas>
  <div class="grain"></div>
  <div class="ambient-layer"></div>
  <div class="vignette"></div>
  <div class="hud-reticle"></div>
  <div class="frame"></div>

  <header class="topbar">
    <div class="logo">HUBTOWN</div>
    <div class="buttons">
      <div class="btn"><span class="pixel-icon"><i></i><i></i><i></i><i></i></span>Login</div>
      <div class="btn light"><span class="pixel-icon"><i></i><i></i><i></i><i></i></span>Menu</div>
    </div>
  </header>

  <nav class="side-nav" id="nav"></nav>

  <main class="hero-copy" id="copy">
    <div class="eyebrow" id="eyebrow">AERIAL</div>
    <h1 id="title">INITIALIZING GRID</h1>
    <p id="desc">The system opens. The Grid reveals itself from above — vast, geometric, alive with data.</p>
    <div class="cta" id="cta">ENTER THE GRID</div>
  </main>

  <div class="data-hud">
    <span id="hudSector">GRID SECTOR: ALPHA</span>
    <span id="hudAltitude">altitude 000</span>
    <span id="hudSpeed" style="display:flex; align-items:center;">velocity 000 <div class="speed-bar"><div class="speed-fill" id="speedFill"></div></div></span>
    <span id="hudSignal">signal loading</span>
  </div>

  <div class="progress-panel">
    <div class="progress-label"><span>Scroll timeline</span><span id="percent">0%</span></div>
    <div class="track"><div class="fill" id="fill"></div></div>
  </div>

  <footer class="bottom-bar">
    <div class="sound">◖ Sound on</div>
    <div class="chat">Chat with us ◌</div>
  </footer>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const GLB_URL = 'https://raw.githubusercontent.com/gustavoquinteros/Teste-J/main/Untitled.glb';

    const dom = {
      canvas: document.getElementById('scene'),
      fill: document.getElementById('fill'),
      percent: document.getElementById('percent'),
      nav: document.getElementById('nav'),
      copy: document.getElementById('copy'),
      eyebrow: document.getElementById('eyebrow'),
      title: document.getElementById('title'),
      desc: document.getElementById('desc'),
      hudAltitude: document.getElementById('hudAltitude'),
      hudSpeed: document.getElementById('hudSpeed'),
      speedFill: document.getElementById('speedFill'),
      hudSector: document.getElementById('hudSector'),
      hudSignal: document.getElementById('hudSignal'),
      loader: document.getElementById('loader'),
      loaderStep: document.getElementById('loaderStep'),
      loaderPercent: document.getElementById('loaderPercent'),
      loaderFill: document.getElementById('loaderFill'),
      loaderStatus: document.getElementById('loaderStatus')
    };

    const chapters = [
      { key: 'AERIAL', title: 'INITIALIZING GRID', desc: 'The system opens. The Grid reveals itself from above — vast, geometric, alive with data.' },
      { key: 'DESCENT', title: 'ROUTE CALCULATED', desc: 'The cycle locks onto its path. Descending into the Grid, the route pulses cyan beneath.' },
      { key: 'FOLLOW', title: 'PURSUIT ENGAGED', desc: 'Riding the light. The cycle traces its trail across the Grid, leaving permanence behind.' },
      { key: 'VELOCITY', title: 'MAXIMUM VELOCITY', desc: 'The Grid bends to speed. Reality fragments at the edge of what the system can contain.' },
      { key: 'ARRIVAL', title: 'END OF LINE', desc: 'The path resolves. What was pursued becomes clear at the terminal node of the Grid.' }
    ];

    chapters.forEach((chapter, index) => {
      const item = document.createElement('div');
      item.className = 'nav-item' + (index === 0 ? ' active' : '');
      item.textContent = chapter.key;
      dom.nav.appendChild(item);
    });

    const navItems = [...document.querySelectorAll('.nav-item')];
    const PATH_START = -60;
    const PATH_END = 900;

    let targetProgress = 0;
    let smoothProgress = 0;
    let activeChapter = -1;
    let vehicleLoaded = false;
    let appStarted = false;
    let animationFrame = null;
    let loaderProgress = 0;
    
    let lastScrollY = 0, scrollVelocity = 0, aberrationStrength = 0;
    let mx = 0, my = 0, camParallaxX = 0, camParallaxY = 0;
    
    let lastInteraction = Date.now();
    window.isIdle = false;
    const resetIdle = () => { 
      lastInteraction = Date.now(); 
      window.isIdle = false; 
      document.querySelector('.hud-reticle').classList.remove('is-idle'); 
    };
    ['scroll', 'mousemove', 'click', 'touchmove'].forEach(e => 
      window.addEventListener(e, resetIdle, { passive: true })
    );

    window.addEventListener('mousemove', (e) => {
      mx = (e.clientX / window.innerWidth  - 0.5);
      my = (e.clientY / window.innerHeight - 0.5);
    });
    
    let activePulses = [];
    window.addEventListener('click', () => {
      if (activePulses.length >= 3) return;
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(2, 2.4, 48),
        new THREE.MeshBasicMaterial({
          color: 0x00f0ff, transparent: true,
          opacity: 0.9, side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending
        })
      );
      ring.position.copy(vehicleRoot.position);
      ring.position.y = 0.1;
      ring.rotation.x = -Math.PI / 2;
      scene.add(ring);
      activePulses.push({ ring, born: clock.getElapsedTime() });
    });

    const clock = new THREE.Clock();
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000005, 0.0018);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 1800);

    const renderer = new THREE.WebGLRenderer({
      canvas: dom.canvas,
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    // Post-processing
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.7, 0.25);
    composer.addPass(bloomPass);

    const scanlineShader = {
      uniforms: { tDiffuse: { value: null }, time: { value: 0 } },
      vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float time;
        varying vec2 vUv;
        void main() {
          vec4 color = texture2D(tDiffuse, vUv);
          float scanline = sin(vUv.y * 900.0) * 0.03;
          gl_FragColor = vec4(color.rgb - scanline, color.a);
        }`
    };
    const scanlinePass = new ShaderPass(scanlineShader);
    composer.addPass(scanlinePass);

    const aberrationShader = {
      uniforms: { tDiffuse: { value: null }, aberrationStrength: { value: 0.0 } },
      vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float aberrationStrength;
        varying vec2 vUv;
        void main() {
          vec2 dir = vUv - vec2(0.5);
          float dist = length(dir);
          vec4 r = texture2D(tDiffuse, vUv + dir * aberrationStrength * dist);
          vec4 g = texture2D(tDiffuse, vUv);
          vec4 b = texture2D(tDiffuse, vUv - dir * aberrationStrength * dist);
          gl_FragColor = vec4(r.r, g.g, b.b, 1.0);
        }`
    };
    const chromaticPass = new ShaderPass(aberrationShader);
    composer.addPass(chromaticPass);

    const glitchPass = new GlitchPass();
    glitchPass.enabled = false;
    composer.addPass(glitchPass);

    function clamp(v, min = 0, max = 1) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOut(t) { return t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

    function routeX(z, offset = 0) {
      return Math.sin(z * .019 + offset) * 58
        + Math.sin(z * .0065 + offset * 2.2) * 42
        + Math.cos(z * .044 + offset) * 10;
    }

    function terrainHeight(x, z) {
      return 0; // Flat Grid
    }

    class RoadCurve extends THREE.Curve {
      getPoint(t, target = new THREE.Vector3()) {
        const z = lerp(PATH_START, PATH_END, t);
        const x = routeX(z);
        const y = terrainHeight(x, z) + 1.8;
        return target.set(x, y, z);
      }
    }

    class OffsetRoadCurve extends THREE.Curve {
      constructor(offset) { super(); this.offset = offset; }
      getPoint(t, target = new THREE.Vector3()) {
        const z = lerp(PATH_START, PATH_END, t);
        const x = routeX(z);
        const zA = z + 4;
        const zB = z - 4;
        const dx = routeX(zA) - routeX(zB);
        const side = new THREE.Vector3(1, 0, -dx / 8).normalize();
        const ox = side.x * this.offset;
        const oz = side.z * this.offset;
        const y = terrainHeight(x + ox, z + oz) + 2;
        return target.set(x + ox, y, z + oz);
      }
    }

    function makeTerrain() {
      const geo = new THREE.PlaneGeometry(2400, 2400, 100, 100);
      geo.rotateX(-Math.PI / 2);
      const edges = new THREE.EdgesGeometry(geo);
      const mat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending });
      
      mat.onBeforeCompile = (shader) => {
        shader.uniforms.time = { value: 0 };
        shader.vertexShader = `uniform float time;\n` + shader.vertexShader;
        shader.vertexShader = shader.vertexShader.replace(
          `#include <begin_vertex>`,
          `
          vec3 transformed = vec3(position);
          transformed.y += sin(position.x * 0.04 + time) * 1.5 + sin(position.z * 0.03 + time * 0.7) * 2.0;
          `
        );
        mat.userData.shader = shader;
      };
      
      const grid = new THREE.LineSegments(edges, mat);
      grid.name = 'terrain-wire';
      scene.add(grid);

      const geoSparse = new THREE.PlaneGeometry(2400, 2400, 50, 50);
      geoSparse.rotateX(-Math.PI / 2);
      const edgesSparse = new THREE.EdgesGeometry(geoSparse);
      const matSparse = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.04, blending: THREE.AdditiveBlending });
      const gridSparse = new THREE.LineSegments(edgesSparse, matSparse);

        const edgeMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        
        const pillarGeo = new THREE.BoxGeometry(1.5, 30, 1.5);
        const leftPillar = new THREE.Mesh(pillarGeo, mat);

        scanMat.onBeforeCompile = (shader) => {
          shader.uniforms.time = { value: 0 };
          shader.fragmentShader = `uniform float time;\n` + shader.fragmentShader;
          shader.fragmentShader = shader.fragmentShader.replace(
            `#include <color_fragment>`,
            `
            #include <color_fragment>
            diffuseColor.a *= 0.5 + 0.5 * sin(vUv.y * 40.0 - time * 5.0);
            `
          );
          scanMat.userData.shader = shader;

    function loadVehicleGLB() {
      return new Promise((resolve) => {
        const loader = new GLTFLoader();
        let resolved = false;

        const timeout = window.setTimeout(() => {
          if (resolved) return;
          resolved = true;
          vehicleLoaded = false;
          setLoadProgress(92, 'fallback ready', 'GLB demorou: usando veículo fallback');
          resolve(false);
        }, 6500);

        loader.load(
          GLB_URL,
          (gltf) => {
            if (resolved) return;
            resolved = true;
            window.clearTimeout(timeout);

            vehicleRoot.clear();
            vehicleObject = gltf.scene;
            vehicleObject.name = 'loaded-glb-vehicle';

            const box = new THREE.Box3().setFromObject(vehicleObject);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();
            box.getSize(size);
            box.getCenter(center);
            const maxAxis = Math.max(size.x, size.y, size.z) || 1;
            const scale = 15 / maxAxis;

            vehicleObject.position.sub(center);
            vehicleObject.scale.setScalar(scale);
            vehicleObject.rotation.y = Math.PI;

            vehicleObject.traverse((child) => {
              if (!child.isMesh || !child.material) return;
              child.material = child.material.clone();
              if ('color' in child.material) child.material.color = new THREE.Color(0xd5e0ff);
              if ('emissive' in child.material) child.material.emissive = new THREE.Color(0x073f68);
              if ('emissiveIntensity' in child.material) child.material.emissiveIntensity = .42;
              if ('roughness' in child.material) child.material.roughness = .42;
              if ('metalness' in child.material) child.material.metalness = .28;
            });

            vehicleRoot.add(vehicleObject);
            vehicleRoot.add(vehicleGlow);
            vehicleLoaded = true;
            setLoadProgress(95, 'object loaded', 'GLB carregado com sucesso');
            resolve(true);
          },
          (event) => {
            if (!event.lengthComputable) {
              setLoadProgress(76, 'loading object', 'baixando GLB');
              return;
            }
            const assetProgress = event.loaded / event.total;
            setLoadProgress(74 + assetProgress * 18, 'loading object', 'baixando GLB');
          },
          (error) => {
            if (resolved) return;
            resolved = true;
            window.clearTimeout(timeout);
            vehicleLoaded = false;
            console.warn('[GLB fallback] Não foi possível carregar o GLB. Usando fallback.', error);
            setLoadProgress(92, 'fallback ready', 'falha no GLB: usando veículo fallback');
            resolve(false);
          }
        );
      });
    }

    function makeTrail() {
      const pointsLeft = [];
      const pointsRight = [];
      const NUM_POINTS = 100;
      for (let i = 0; i < NUM_POINTS; i++) {
        pointsLeft.push(new THREE.Vector3());
        pointsRight.push(new THREE.Vector3());
      }
      const geoLeft = new THREE.BufferGeometry().setFromPoints(pointsLeft);
      const geoRight = new THREE.BufferGeometry().setFromPoints(pointsRight);
      
      const trailGroup = new THREE.Group();
      trailGroup.name = 'vehicle-trail';
      
      const linesLeft = [];
      const linesRight = [];

      [0.85, 0.4, 0.15].forEach((opacity, idx) => {
        const mat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity, blending: THREE.AdditiveBlending });
        const offset = idx * 0.1;
        const leftLine = new THREE.Line(geoLeft, mat);
        leftLine.position.y = offset + 0.1;
        leftLine.frustumCulled = false;
        trailGroup.add(leftLine);
        linesLeft.push(leftLine);
        
        const rightLine = new THREE.Line(geoRight, mat);
        rightLine.position.y = offset + 0.1;
        rightLine.frustumCulled = false;
        trailGroup.add(rightLine);
        linesRight.push(rightLine);
      });
      scene.add(trailGroup);
      return { group: trailGroup, pointsLeft, pointsRight, length: NUM_POINTS, linesLeft, linesRight };
    }

    function updateScroll() {

      targetProgress = max > 0 ? clamp(window.scrollY / max) : 0;
      
      const delta = Math.abs(window.scrollY - lastScrollY);

    function updateCopy() {
      const chapterIndex = Math.min(chapters.length - 1, Math.floor(smoothProgress * chapters.length));
      if (chapterIndex === activeChapter) return;
      activeChapter = chapterIndex;
      const chapter = chapters[chapterIndex];
      dom.copy.style.opacity = '0';
      window.setTimeout(() => {
        dom.eyebrow.textContent = chapter.key;
        dom.title.innerHTML = chapter.title;
        dom.desc.textContent = chapter.desc;
        dom.copy.style.opacity = '1';
      }, 180);
      navItems.forEach((item, i) => item.classList.toggle('active', i === chapterIndex));
      
      if (glitchPass) {
        glitchPass.enabled = true;
        window.setTimeout(() => glitchPass.enabled = false, 400);
      }
      
      const reticle = document.querySelector('.hud-reticle');
      if (reticle) {
        reticle.classList.add('hud-orange');
        window.setTimeout(() => reticle.classList.remove('hud-orange'), 400);
      }
      
      vehicleLight.intensity = 28;
      window.setTimeout(() => vehicleLight.intensity = 12, 200);
      
      switch (chapterIndex) {
        case 0:
          targetBloom = 1.4; targetFogDensity = 0.0028; targetGridOpacity = 0.10;
          dom.hudSector.textContent = 'GRID SECTOR: ALPHA';
          break;
        case 1:
          targetBloom = 1.8; targetFogDensity = 0.0022; targetGridOpacity = 0.14;
          dom.hudSector.textContent = 'GRID SECTOR: BETA — ROUTE LOCKED';
          break;
        case 2:
          targetBloom = 2.1; targetFogDensity = 0.0018; targetGridOpacity = 0.16;
          dom.hudSector.textContent = 'GRID SECTOR: GAMMA — PURSUIT ACTIVE';
          break;
        case 3:
          targetBloom = 2.6; targetFogDensity = 0.0012; targetGridOpacity = 0.20;
          dom.hudSector.textContent = 'MAX VELOCITY — BREACH IMMINENT';
          break;
        case 4:
          targetBloom = 1.6; targetFogDensity = 0.0022; targetGridOpacity = 0.10;
          dom.hudSector.textContent = 'END OF LINE';
          break;
      }
      dom.hudSector.classList.toggle('warning', chapterIndex === 3);
    }

    function updateVehicleAndCamera() {
      const travel = easeInOut(smoothProgress);
      const descent = easeInOut(clamp((smoothProgress - .02) / .43));
      const pathT = clamp(travel * .94 + .025);

      roadCurve.getPoint(pathT, tmp.point);
      roadCurve.getTangent(pathT, tmp.tangent).normalize();
      tmp.side.crossVectors(tmp.worldUp, tmp.tangent).normalize();

      const lift = lerp(2.5, 3.9, descent);
      vehicleRoot.position.copy(tmp.point).add(new THREE.Vector3(0, lift, 0));
      tmp.quat.setFromUnitVectors(new THREE.Vector3(0, 0, 1), tmp.tangent);
      vehicleRoot.quaternion.slerp(tmp.quat, .18);

      vehicleLight.position.copy(vehicleRoot.position).add(new THREE.Vector3(0, 8, 0));
      rimLight.position.copy(vehicleRoot.position).add(tmp.side.clone().multiplyScalar(42)).add(new THREE.Vector3(0, 28, -18));
      deepLight.position.copy(vehicleRoot.position).add(tmp.tangent.clone().multiplyScalar(86)).add(new THREE.Vector3(0, 18, 0));

      for (let i = 0; i < trail.length; i++) {
        const t = clamp(pathT - i * .0015);
        roadCurve.getPoint(t, tmp.point);
        roadCurve.getTangent(t, tmp.tangent).normalize();
        tmp.side.crossVectors(tmp.worldUp, tmp.tangent).normalize();
        
        trail.pointsLeft[i].copy(tmp.point).add(tmp.side.clone().multiplyScalar(2.5));
        trail.pointsRight[i].copy(tmp.point).add(tmp.side.clone().multiplyScalar(-2.5));
        trail.pointsLeft[i].y = 0.05;
        trail.pointsRight[i].y = 0.05;
      }
      
      trail.linesLeft.forEach(l => l.geometry.setFromPoints(trail.pointsLeft));
      trail.linesRight.forEach(l => l.geometry.setFromPoints(trail.pointsRight));
      
      const targetOpacityMultiplier = lerp(0, 1, descent);
      [0.85, 0.4, 0.15].forEach((baseOpacity, idx) => {
         trail.linesLeft[idx].material.opacity = baseOpacity * targetOpacityMultiplier;
         trail.linesRight[idx].material.opacity = baseOpacity * targetOpacityMultiplier;
      });

      tmp.topCam.copy(tmp.point).add(new THREE.Vector3(0, 280, 0)).add(tmp.side.clone().multiplyScalar(lerp(34, 0, descent)));
      tmp.followCam.copy(tmp.point)
        .add(tmp.tangent.clone().multiplyScalar(-48))
        .add(tmp.side.clone().multiplyScalar(lerp(12, 4, descent)))
        .add(new THREE.Vector3(0, 13, 0));

      tmp.camPos.copy(tmp.topCam).lerp(tmp.followCam, descent);
      tmp.lookAhead.copy(tmp.point).add(tmp.tangent.clone().multiplyScalar(lerp(3, 52, descent)));
      tmp.targetTop.copy(tmp.point);
      tmp.targetFollow.copy(tmp.lookAhead).add(new THREE.Vector3(0, 2.4, 0));
      tmp.camTarget.copy(tmp.targetTop).lerp(tmp.targetFollow, descent);

      camera.position.lerp(tmp.camPos, .09);
      
      camParallaxX = lerp(camParallaxX, mx * 20, 0.04);
      camParallaxY = lerp(camParallaxY, my * -10, 0.04);
      camera.position.x += camParallaxX;
      camera.position.y += camParallaxY;
      
      if (window.isIdle) {
        const idleSway = (Date.now() - lastInteraction - 4000) / 1000;
        camera.position.x += Math.sin(clock.getElapsedTime() * 0.4) * Math.min(idleSway * 0.5, 3);
        camera.position.y += Math.cos(clock.getElapsedTime() * 0.3) * Math.min(idleSway * 0.3, 1.5);
      }
      
      camera.lookAt(tmp.camTarget);
      camera.fov = lerp(42, 57, descent) + Math.sin(smoothProgress * Math.PI) * 3;
      camera.updateProjectionMatrix();

      dom.hudAltitude.textContent = `altitude ${Math.round(camera.position.y).toString().padStart(3, '0')}`;
      dom.hudSpeed.textContent = `velocity ${Math.round(lerp(38, 186, descent)).toString().padStart(3, '0')}`;
      
      dom.speedFill.style.width = (descent * 100) + '%';
      const signalStates = ['LOCKED', 'SCANNING', 'PURSUIT ACTIVE', 'BREACH', 'SECURE'];
      dom.hudSignal.textContent = `signal ${signalStates[activeChapter] || 'loading'}`;

      return { pathT, descent };
    }

    function updateImmersiveMotion(elapsed, pathT, descent) {
      if (immersiveObjects.stars) {
        immersiveObjects.stars.rotation.y = elapsed * .008;
        immersiveObjects.stars.material.opacity = lerp(.78, .32, descent);
      }

      immersiveObjects.auroras.forEach((ribbon, index) => {
        ribbon.position.y = Math.sin(elapsed * .38 + index) * 2.2;
        ribbon.material.opacity = (.07 + Math.sin(elapsed * .7 + index) * .018) * lerp(1.2, .55, descent);
      });

      immersiveObjects.gates.forEach((gateGroup) => {
        const d = Math.abs(gateGroup.userData.baseT - pathT);
        const proximity = clamp(1 - d / .06);
        if (gateGroup.userData.scanMat.userData.shader) {
          gateGroup.userData.scanMat.userData.shader.uniforms.time.value = elapsed;
        }
        gateGroup.userData.scanMat.opacity = 0.06 + proximity * 0.15;
        gateGroup.scale.y = 1 + proximity * 0.15;
      });

      immersiveObjects.flow.forEach((packet, index) => {
        const baseSpeed = 0.015;
        const speedMult = (window.isIdle ? 3.0 : 1.0) * packet.userData.speed;
        const flowT = (pathT + packet.userData.offset + elapsed * baseSpeed * speedMult) % 1;
        const z = lerp(PATH_START, PATH_END, flowT);
        const x = routeX(z);
        const zA = z + 2;
        const zB = z - 2;
        const dx = routeX(zA) - routeX(zB);
        const side = new THREE.Vector3(1, 0, -dx / 4).normalize();
        packet.position.set(x + side.x * packet.userData.lane, 0.2, z + side.z * packet.userData.lane);
        
        const tangent = new THREE.Vector3(dx, 0, 4).normalize();
        packet.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), tangent);
        
        const distanceToVehicle = Math.abs(flowT - pathT);
        const isNear = distanceToVehicle < 0.05;
        packet.material.color.setHex(isNear ? 0xff6a00 : 0xe8f4ff);
      });
      
      if (activeChapter === 4 && immersiveObjects.portal) {
        immersiveObjects.portal.group.scale.lerp(new THREE.Vector3(1, 1, 1), 0.05);
      } else if (immersiveObjects.portal) {
        immersiveObjects.portal.group.scale.lerp(new THREE.Vector3(0.001, 0.001, 0.001), 0.05);
      }
      if (immersiveObjects.portal) {
        immersiveObjects.portal.t1.rotation.y += 0.01;
        immersiveObjects.portal.t2.rotation.y -= 0.015;
      }
    }

    function runTests() {
      console.groupCollapsed('[Scroll 3D Demo] sanity tests');
      console.assert(typeof THREE.Scene === 'function', 'THREE importado');
      console.assert(typeof GLTFLoader === 'function', 'GLTFLoader importado');
      console.assert(document.documentElement.scrollHeight > window.innerHeight, 'página tem altura para scroll');
      console.assert(routeX(0) !== routeX(100), 'routeX gera curva');
      console.assert(Number.isFinite(terrainHeight(0, 0)), 'terrainHeight retorna número válido');
      console.assert(scene.getObjectByName('terrain-mesh'), 'terreno adicionado');
      console.assert(scene.getObjectByName('road-line-center'), 'linha central adicionada');
      console.assert(scene.getObjectByName('vehicle-root'), 'veículo adicionado');
      console.assert(scene.getObjectByName('sky-starfield'), 'estrelas adicionadas');
      console.assert(scene.getObjectByName('aurora-ribbon-0'), 'auroras adicionadas');
      console.assert(scene.getObjectByName('energy-gate-0'), 'gates adicionados');
      console.assert(scene.getObjectByName('flow-orb-0'), 'partículas de fluxo adicionadas');
      console.assert(renderer.domElement === dom.canvas, 'renderer usando canvas correto');
      console.groupEnd();
    }

    function animate() {
      if (!appStarted) return;
      animationFrame = requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      smoothProgress += (targetProgress - smoothProgress) * .045;

      const motionState = updateVehicleAndCamera();
      updateImmersiveMotion(elapsed, motionState.pathT, motionState.descent);
      updateCopy();

      dom.fill.style.width = (smoothProgress * 100).toFixed(1) + '%';
      dom.percent.textContent = Math.round(smoothProgress * 100) + '%';

      vehicleGlow.material.opacity = .12 + Math.sin(elapsed * 3.2) * .035;
      vehicleGlow.rotation.y += .015;
      scene.rotation.y = Math.sin(elapsed * .08) * .006;

      const isIdleTime = Date.now() - lastInteraction > 4000;
      if (isIdleTime && !window.isIdle) {
        window.isIdle = true;
        document.querySelector('.hud-reticle').classList.add('is-idle');
      }

      activePulses = activePulses.filter(({ ring, born }) => {
        const age = elapsed - born;
        const t = age / 0.7;
        if (t >= 1) { scene.remove(ring); ring.geometry.dispose(); return false; }
        ring.scale.setScalar(1 + t * 45);
        ring.material.opacity = 0.9 * (1 - t);
        return true;
      });

      bloomPass.strength = lerp(bloomPass.strength, targetBloom, 0.05);
      scene.fog.density = lerp(scene.fog.density, targetFogDensity, 0.05);
      if (immersiveObjects.gridMaterial) {
         immersiveObjects.gridMaterial.opacity = lerp(immersiveObjects.gridMaterial.opacity, targetGridOpacity, 0.05);
      }

      aberrationStrength = lerp(aberrationStrength, scrollVelocity / 20000, 0.08);
      chromaticPass.uniforms['aberrationStrength'].value = Math.max(aberrationStrength, activeChapter === 3 ? 0.003 : 0);
      
      scanlinePass.uniforms['time'].value = elapsed;
      composer.render();
    }

    function onResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(width, height);
      composer.setSize(width, height);
      updateScroll();
    }

    async function boot() {
      try {
        setLoadProgress(8,  'INITIALIZING GRID',    'calibrating terrain matrix');
        onResize();
        updateScroll();

        setLoadProgress(18, 'COMPILING ROUTE',      'calculating path splines');
        makeSkyField();
        makeTerrain();

        setLoadProgress(38, 'ACTIVATING GRID',      'rendering grid plane geometry');
        makeRoad();
        makeEnergyGates();
        makeFlowParticles();
        makePortal();

        setLoadProgress(55, 'LOADING CYCLE',        'fetching light cycle model');
        makeCubes();
        makeParticles();

        setLoadProgress(74, 'CALIBRATING SENSORS',  'aligning camera to path');
        await loadVehicleGLB();

        setLoadProgress(92, 'SYNCING HUD',          'connecting data overlay');
        updateVehicleAndCamera();
        updateCopy();
        composer.render();
        runTests();

        setLoadProgress(100,'ENTERING THE GRID',    'system ready');
        window.setTimeout(() => {
          document.body.classList.add('is-ready');
          dom.loader.classList.add('is-hidden');
          appStarted = true;
          clock.start();
          if (animationFrame) cancelAnimationFrame(animationFrame);
          animate();
          console.log('%c HUBTOWN v2.0 — TRON GRID ACTIVE ', 'background:#000;color:#00f0ff;font-family:monospace;font-size:14px;padding:4px 12px;border:1px solid #00f0ff;');
        }, 450);
      } catch (error) {
        console.error('[Boot error]', error);
        dom.loaderStatus.textContent = 'erro ao iniciar cena — ver console';
      }
    }

    window.addEventListener('resize', onResize);
    window.addEventListener('scroll', updateScroll, { passive: true });
    window.addEventListener('wheel', updateScroll, { passive: true });
    window.addEventListener('touchmove', updateScroll, { passive: true });

    boot();
  </script>
</body>
